<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
  <style>
    h1{
        background-color: cadetblue;
        height: 300px;
        width: 300px;
        border: 3px solid black;
        padding: 10px;
        margin: auto;
        outline: 9px solid red;
        
    }
    
    a{
        padding: 2px;
        border: 2px dashed black;
    }
  </style>
</head>
<body>
    <h1>Exemplo de caixa BOX-LEVEL</h1>
    <p>Paragrafos tambem sao do tipo box-level, mas os links são do tipo <a href="#">inline level</a>. Vamos ver como tudo isso funciona </p>
    
</body>
</html>
