<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javas Scripts</title>

</head>
<body style="background-color: cadetblue;">
    <a href="#" onclick="clicou()">Clique em mim</a>
    <div id="saida"></div>
    <script>
        function clicou(){
           let s = window.document.getElementById("saida")
           s.innerHTML +=`Voce clicou!`
        }
    </script>
</body>
</html>
